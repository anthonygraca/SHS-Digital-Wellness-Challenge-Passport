<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff4438" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <!-- iOS ignores the manifest's icons when adding to the home screen, so the
         apple-touch-icon is the only thing standing between an installed app and a
         screenshot of the page as its icon. -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Design-prototype type stack: Roboto body, Oswald/Cinzel per-theme display
         (--wp-font-display). Without these the tokens fall back to system fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Oswald:wght@400;500;600;700&family=Cinzel:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>SHS Wellness Passport</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
