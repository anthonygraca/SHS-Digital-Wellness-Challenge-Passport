AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  SHS Digital Wellness Passport — serverless full stack. Per-route Lambda functions
  (auth / bootstrap / enrollment / passport / challenges / assessments / reports /
  themes / guide) + a health probe, behind one API Gateway HTTP API ($default stage),
  backed by one DynamoDB table per entity — all fronted by a CloudFront distribution
  that also serves the SPA from a private S3 bucket, so the app and the API share one
  origin (docs/cloudfront-deploy-guide.md explains the distribution these resources
  provision).

Parameters:
  TablePrefix:
    Type: String
    Default: wp-
    Description: Prefix for the DynamoDB table names (must match WP_DDB_TABLE_PREFIX).
  AuthProvider:
    Type: String
    Default: mock
    AllowedValues: [mock, saml]
    Description: Identity provider. "mock" for the demo IdP; "saml" for a real campus IdP.
  JwtSecret:
    Type: String
    NoEcho: true
    Description: HS256 session-signing secret (32+ bytes). Keep stable across deploys.
  QrSecret:
    Type: String
    NoEcho: true
    Description: HS256 event-QR signing secret (32+ bytes), separate from JwtSecret.
  CookieSecure:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Mark the session cookie Secure (true when served via CloudFront HTTPS).

Globals:
  Function:
    Runtime: python3.12
    Timeout: 15
    MemorySize: 256
    CodeUri: backend/
    Layers:
      - !Ref DependenciesLayer
    Environment:
      Variables:
        WP_PERSISTENCE: dynamo
        WP_DDB_TABLE_PREFIX: !Ref TablePrefix
        WP_AUTH_PROVIDER: !Ref AuthProvider
        WP_JWT_SECRET: !Ref JwtSecret
        WP_QR_SECRET: !Ref QrSecret
        WP_COOKIE_SECURE: !Ref CookieSecure

Resources:
  # --- Shared dependency layer (fastapi, mangum, pydantic, sqlalchemy, ...) ---
  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "${AWS::StackName}-deps"
      ContentUri: backend/layer
      CompatibleRuntimes:
        - python3.12
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.12

  # --- Functions (one per route group; each gets only the tables it needs) ----
  AuthFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.functions.auth.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}Students"
      Events:
        Auth:
          Type: HttpApi
          Properties:
            Path: /auth/{proxy+}
            Method: ANY
        MockIdp:
          Type: HttpApi
          Properties:
            Path: /mock-idp/{proxy+}
            Method: ANY

  EnrollmentFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.functions.enrollment.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}Enrollments"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Challenges"
      Events:
        Enrollment:
          Type: HttpApi
          Properties:
            Path: /enrollment
            Method: ANY

  PassportFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.functions.passport.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}CheckIns"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Challenges"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Tasks"
        # Read-only: the passport resolves its challenge's theme on every build so an
        # admin's re-skin shows up on the student's next fetch (FR-B4 / US-13).
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Themes"
        # The scan route records the tip it hands out, and /api/content-views records
        # a week being opened (FR-F3 / US-23) — both write-only from here.
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}ContentViews"
      Events:
        Passport:
          Type: HttpApi
          Properties:
            Path: /api/passport
            Method: ANY
        # Scanning an event QR is the only way to check in — there is deliberately
        # no manual /api/checkins route to bypass it.
        CheckinScan:
          Type: HttpApi
          Properties:
            Path: /api/checkins/scan
            Method: ANY

  # The SPA's first render used to be three sequential calls into AuthFn, then
  # EnrollmentFn, then PassportFn. This answers all three at once.
  #
  # It reads five tables, which is more than any other function here and dilutes the
  # per-function least-privilege story the rest of this template is built around. The
  # trade-off is deliberate and bounded: every policy below is DynamoDBReadPolicy —
  # no writes, and no access to Counters or the audit ledger at all. A function that
  # can only read the five tables whose contents it is about to hand to the signed-in
  # owner of that data is a narrower grant than its table count suggests. If it ever
  # needs to write something, that is the signal to split it rather than add a policy.
  BootstrapFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.functions.bootstrap.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Challenges"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Enrollments"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Tasks"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}CheckIns"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Themes"
      Events:
        Bootstrap:
          Type: HttpApi
          Properties:
            Path: /api/bootstrap
            Method: ANY

  ChallengesFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.functions.challenges.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}Challenges"
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}Tasks"
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}AssessmentItems"
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}Counters"
        # FR-D6 manual completion override: writes a CheckIn and its audit row in one
        # transaction, and reads Students to resolve/display the subject.
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}CheckIns"
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}CheckInAudits"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Students"
        # FR-E5 score override: read the responses, write the corrected score.
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}AssessmentResponses"
      Events:
        Challenges:
          Type: HttpApi
          Properties:
            Path: /api/challenges/{proxy+}
            Method: ANY
        ChallengesRoot:
          Type: HttpApi
          Properties:
            Path: /api/challenges
            Method: ANY

  AssessmentsFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.functions.assessments.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}AssessmentResponses"
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}Counters"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Challenges"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Tasks"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}AssessmentItems"
      Events:
        Assessments:
          Type: HttpApi
          Properties:
            Path: /api/assessments/{proxy+}
            Method: ANY

  # Read-only across the cohort's data (FR-F1..F5). No writes: every report re-derives
  # from rows other features already wrote. The prize export reads CheckIns
  # strongly-consistent (base table), which DynamoDBReadPolicy already covers.
  ReportsFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.functions.reports.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Challenges"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Tasks"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}Enrollments"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}CheckIns"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}AssessmentItems"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}AssessmentResponses"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}ContentViews"
        - DynamoDBReadPolicy:
            TableName: !Sub "${TablePrefix}GuideSessions"
      Events:
        Reports:
          Type: HttpApi
          Properties:
            Path: /api/reports/{proxy+}
            Method: ANY

  # The guide holds no data at all — routers/guide.py takes no db and writes no
  # transcript, deliberately (see its docstring). So: no table, no policy.
  GuideFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.functions.guide.handler
      Events:
        Guide:
          Type: HttpApi
          Properties:
            Path: /api/guide/{proxy+}
            Method: ANY

  ThemesFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.functions.themes.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub "${TablePrefix}Themes"
      Events:
        ThemesRoot:
          Type: HttpApi
          Properties:
            Path: /api/themes
            Method: ANY
        Themes:
          Type: HttpApi
          Properties:
            Path: /api/themes/{proxy+}
            Method: ANY

  HealthFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.functions.health.handler
      Events:
        Health:
          Type: HttpApi
          Properties:
            Path: /healthz
            Method: GET

  # --- DynamoDB tables (one per entity, on-demand) ----------------------------
  StudentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}Students"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: student_id
          AttributeType: S
      KeySchema:
        - AttributeName: student_id
          KeyType: HASH

  ChallengesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}Challenges"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: N
        - AttributeName: campus_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: pub_campus_id
          AttributeType: S
        - AttributeName: published_sort
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ByCampus
          KeySchema:
            - AttributeName: campus_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: PublishedByCampus
          KeySchema:
            - AttributeName: pub_campus_id
              KeyType: HASH
            - AttributeName: published_sort
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  TasksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}Tasks"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: N
        - AttributeName: challenge_id
          AttributeType: N
        - AttributeName: position
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ByChallenge
          KeySchema:
            - AttributeName: challenge_id
              KeyType: HASH
            - AttributeName: position
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AssessmentItemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}AssessmentItems"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: N
        - AttributeName: task_id
          AttributeType: N
        - AttributeName: challenge_id
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ByTask
          KeySchema:
            - AttributeName: task_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ByChallenge
          KeySchema:
            - AttributeName: challenge_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  EnrollmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}Enrollments"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: student_id
          AttributeType: S
        - AttributeName: challenge_id
          AttributeType: N
        - AttributeName: enrolled_at
          AttributeType: S
      KeySchema:
        - AttributeName: student_id
          KeyType: HASH
        - AttributeName: challenge_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # The base key answers "is THIS student enrolled?"; the participation report
        # needs "how many are enrolled in this challenge?", which the base key cannot
        # serve. KEYS_ONLY because the report only counts — Select=COUNT ships a number,
        # not ~200 keys.
        - IndexName: ByChallenge
          KeySchema:
            - AttributeName: challenge_id
              KeyType: HASH
            - AttributeName: enrolled_at
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY

  CheckInsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}CheckIns"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: student_id
          AttributeType: S
        - AttributeName: task_id
          AttributeType: N
        # Denormalized off the task so a challenge's check-ins are one query — the
        # same pattern AssessmentItems already uses for its ByChallenge index.
        - AttributeName: challenge_id
          AttributeType: N
        - AttributeName: ts
          AttributeType: S
      KeySchema:
        - AttributeName: student_id
          KeyType: HASH
        - AttributeName: task_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # The base table answers "has THIS student done this task?". These answer the
        # admin/report direction — "who has done this task / this challenge?" — which
        # the base key cannot serve at all. ts as the range key makes newest-first and
        # "the most recent N" native, with no in-app sort.
        - IndexName: ByTask
          KeySchema:
            - AttributeName: task_id
              KeyType: HASH
            - AttributeName: ts
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ByChallenge
          KeySchema:
            - AttributeName: challenge_id
              KeyType: HASH
            - AttributeName: ts
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # Append-only ledger of admin completion changes (FR-D6 / US-27). Written only in
  # the same transaction as the CheckIn change it records, never updated or deleted.
  CheckInAuditsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}CheckInAudits"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: task_id
          AttributeType: N
        # "<ts>#<id>" — encodes the ledger's ordering into the key, so reading it
        # newest-first is the index's own order rather than an in-app sort.
        - AttributeName: audit_id
          AttributeType: S
      KeySchema:
        - AttributeName: task_id
          KeyType: HASH
        - AttributeName: audit_id
          KeyType: RANGE

  CountersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}Counters"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: name
          AttributeType: S
      KeySchema:
        - AttributeName: name
          KeyType: HASH

  # One student's answer to one assessment item (FR-E4 / FR-E5). The key IS
  # uq_response_student_item, so the one-attempt rule is the write itself rather than
  # a check racing it.
  AssessmentResponsesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}AssessmentResponses"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: student_id
          AttributeType: S
        - AttributeName: assessment_item_id
          AttributeType: N
        - AttributeName: challenge_id
          AttributeType: N
        - AttributeName: ts
          AttributeType: S
      KeySchema:
        - AttributeName: student_id
          KeyType: HASH
        - AttributeName: assessment_item_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # ByItem: the admin's "show me every answer to this question" (FR-E5).
        - IndexName: ByItem
          KeySchema:
            - AttributeName: assessment_item_id
              KeyType: HASH
            - AttributeName: ts
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # ByChallenge: the learning-outcome report's per-challenge read (FR-F4, PR 6).
        - IndexName: ByChallenge
          KeySchema:
            - AttributeName: challenge_id
              KeyType: HASH
            - AttributeName: ts
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # A student looking at content (FR-F3 / US-23). Partitioned by challenge because the
  # only read is the engagement report's per-challenge count; nothing fetches one view
  # by id, so there is no GSI. The sort key's uuid suffix is what implements "no unique
  # constraint" — a week is completed once but may be read any number of times, and
  # re-reading is engagement rather than a duplicate.
  ContentViewsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}ContentViews"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: challenge_id
          AttributeType: N
        - AttributeName: view_id
          AttributeType: S
      KeySchema:
        - AttributeName: challenge_id
          KeyType: HASH
        - AttributeName: view_id
          KeyType: RANGE

  # One student's conversation with the wellness guide (FR-F3 / US-23). Nothing writes
  # it yet — the guide stores no transcript (routers/guide.py) — so the engagement
  # report counts a structural zero here. It exists so that count is a real query on
  # both backends rather than a hardcoded 0, honest the day US-16 starts writing rows.
  GuideSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}GuideSessions"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: challenge_id
          AttributeType: N
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: challenge_id
          KeyType: HASH
        - AttributeName: session_id
          KeyType: RANGE

  # Global re-skin presets (FR-B4 / US-13). The id is a slug that doubles as the
  # frontend data-theme value; the row is looked up by id on every passport build
  # and listed (a Scan) from the admin theme picker. No GSI: <20 rows, no query need.
  ThemesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}Themes"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # --- CDN + static hosting -------------------------------------------------
  # One public HTTPS domain in front of everything, so the SPA and the API are
  # same-origin (no CORS, cookies just work). This replaces the by-hand Console
  # click-through that docs/cloudfront-deploy-guide.md used to describe — the guide
  # now documents what these resources provision. Deploying the backend stack updates
  # the distribution too, which adds a few minutes to a deploy; that is the price of
  # the distribution being code rather than console state.

  # Private bucket for the built SPA. Public access fully blocked — CloudFront reaches
  # it through the OAC below, nothing reaches it directly. Auto-named: bucket names are
  # globally unique, and a fixed name would make the stack un-recreatable.
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  # Grants read to *only this distribution*, scoped by its ARN — the policy CloudFront
  # would otherwise hand you to paste into the Console.
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-frontend-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Rewrites an extensionless request (a client-side route like /passport) to the SPA
  # shell, on the S3 behaviors only. Deliberately NOT a custom-error-response 404->/
  # rule: that would also rewrite a real API 404 into index.html with a 200, and the
  # frontend's res.ok check would then choke on HTML (frontend/vite.config.ts).
  SpaRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-spa-rewrite"
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite extensionless requests to the SPA shell (S3 behaviors only).
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request, uri = request.uri;
          var last = uri.substring(uri.lastIndexOf('/') + 1);
          if (last.indexOf('.') === -1) { request.uri = '/index.html'; }
          return request;
        }

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} — SPA + API single origin"
        DefaultRootObject: index.html
        HttpVersion: http2
        # NA + EU edges only: this serves one US campus, so the cheapest class is right.
        PriceClass: PriceClass_100
        Origins:
          - Id: s3-frontend
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt FrontendOAC.Id
            # OAC replaces the legacy OAI, so this is deliberately empty.
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: api-gateway
            # Host only, no https:// and no path — the API uses the $default stage, so
            # /api/passport must reach it unchanged.
            DomainName: !Sub "${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        # The SPA: static, cacheable, and extensionless routes fall back to the shell.
        DefaultCacheBehavior:
          TargetOriginId: s3-frontend
          ViewerProtocolPolicy: redirect-to-https
          # AWS-managed CachingOptimized. These managed-policy ids are global constants
          # (identical in every account/region); confirm with `aws cloudfront
          # list-cache-policies` if ever in doubt.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRewriteFunction.FunctionARN
        # First match wins, so order is load-bearing: /auth/callback (a client route)
        # must be caught by S3 before the /auth/* rule sends it to the API.
        CacheBehaviors:
          - PathPattern: /auth/callback
            TargetOriginId: s3-frontend
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt SpaRewriteFunction.FunctionARN
          - PathPattern: /api/*
            TargetOriginId: api-gateway
            ViewerProtocolPolicy: redirect-to-https
            # CachingDisabled — API responses are per-user, never cached.
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            # AllViewerExceptHostHeader — forwards cookies + query strings but NOT the
            # Host header, which API Gateway would reject as a mismatch (403).
            OriginRequestPolicyId: b689b0a8-53d0-4d0f-b391-8a4b8b5a4b4b
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
          - PathPattern: /auth/*
            TargetOriginId: api-gateway
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-4d0f-b391-8a4b8b5a4b4b
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
          - PathPattern: /enrollment*
            TargetOriginId: api-gateway
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-4d0f-b391-8a4b8b5a4b4b
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
          # Only needed while the mock IdP is in use; drop it for a real SAML provider.
          - PathPattern: /mock-idp*
            TargetOriginId: api-gateway
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-4d0f-b391-8a4b8b5a4b4b
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]

Outputs:
  HttpApiUrl:
    Description: Base URL of the HTTP API (the CloudFront distribution's API origin).
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  HttpApiId:
    Description: HTTP API id (the {apiId} in the execute-api origin domain).
    Value: !Ref ServerlessHttpApi
  FrontendBucket:
    Description: S3 bucket for the built SPA — the <bucket> arg to deploy-frontend.sh.
    Value: !Ref FrontendBucket
  DistributionId:
    Description: CloudFront distribution id — the <dist-id> arg to deploy-frontend.sh.
    Value: !Ref Distribution
  DistributionDomain:
    Description: The one public URL of the app.
    Value: !GetAtt Distribution.DomainName
